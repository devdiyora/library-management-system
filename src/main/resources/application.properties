spring.application.name=library-management-system

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/library_management_system}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Dev@1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:ThisIsMySuperSecretKeyForLibraryManagementSystem2026}
jwt.expiration=${JWT_EXPIRATION:86400000}